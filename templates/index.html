<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Header Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card bg-secondary-subtle text-dark shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <h1 class="text-center mb-3">Security Header Analyzer</h1>
                    <p class="text-center text-muted mb-4">
                        Analiza una URL y revisa configuraciones básicas de seguridad HTTP.
                    </p>

                    <form method="POST">
                        <div class="mb-3">
                            <label for="url" class="form-label fw-semibold">Ingresa una URL</label>
                            <input
                                type="text"
                                class="form-control form-control-lg"
                                id="url"
                                name="url"
                                placeholder="ejemplo.com o https://ejemplo.com"
                                required
                            >
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-dark btn-lg" type="submit">
                                Analizar seguridad
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
